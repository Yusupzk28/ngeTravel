<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Data</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="destinasi-tambah.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Tambah Data</h2>
        </div>
        <form class="form">
            <div class="form-group">
                <label for="destinasi">Destinasi</label>
                <input type="file" id="destinasi" name="destinasi" required>
            </div>
            <div class="form-group">
                <label for="nama destinasi">Nama Destinasi</label>
                <input type="text" id="nama destinasi" name="nama destinasi" required>
            </div>
            <div class="form-group">
                <label for="lokasi">Lokasi</label>
                <input type="text" id="lokasi" name="lokasi" required>
            </div>
            <div class="form-group">
                <label for="deskripsi">Deskripsi</label>
                <input type="text" id="deskripsi" name="deskripsi" accept="image/*">
            </div>
            <button type="submit" class="submit-button">Tambah</button>
        </form>
    </div>
</body>
</html>
